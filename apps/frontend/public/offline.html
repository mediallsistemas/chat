<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem conexão — Mediall Brasil</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; color: #1A2E3B; margin-bottom: 8px; }
    p { font-size: 14px; color: #6B7280; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #B5D334;
      color: #1A2E3B;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #aad63a; }
    .brand { margin-bottom: 24px; font-size: 28px; font-weight: 800; color: #1A2E3B; letter-spacing: -1px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Mediall</div>
    <div class="icon">📡</div>
    <h1>Sem conexão com a internet</h1>
    <p>Você está offline. Verifique sua conexão e tente novamente para acessar a plataforma.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
