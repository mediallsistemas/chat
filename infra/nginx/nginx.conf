events {
  worker_connections 1024;
}

http {
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Rate limiting for auth endpoint
  limit_req_zone $binary_remote_addr zone=auth:10m rate=30r/m;

  server {
    listen 80;
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Bounce direct plaintext HTTP to HTTPS — but NOT requests already terminated
    # as HTTPS by an upstream tunnel (ngrok sets X-Forwarded-Proto: https) that
    # forwards to this server on port 80. Without this guard, ngrok→:80 loops.
    set $force_https "";
    if ($scheme = http) { set $force_https "1"; }
    if ($http_x_forwarded_proto = "https") { set $force_https ""; }
    if ($force_https) { return 301 https://$host$request_uri; }

    # Allow chat file/image uploads (multipart through /api → nestjs → MinIO).
    client_max_body_size 50m;

    # API
    location /api/ {
      proxy_pass http://nestjs:4000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Auth rate limit
    location /api/auth/login {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://nestjs:4000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket
    location /socket.io/ {
      proxy_pass http://nestjs:4000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # MinIO object storage — serves browser-facing signed URLs for chat
    # attachments/avatars. `^~` so image keys (e.g. *.png) win over the static
    # asset regex below. Host is preserved so the S3v4 signature stays valid.
    location ^~ /mediall-files/ {
      proxy_pass http://minio:9000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (SPA fallback)
    location / {
      proxy_pass http://nextjs:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      # Cache static assets 1 year
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://nextjs:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }
  }
}
